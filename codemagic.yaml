workflows:
  android-companion:
    name: SPS Companion Android

    instance_type: mac_mini_m2
    max_build_duration: 30

    environment:
      java: 21
      groups:
        - android
      vars:
        GRADLE_OPTS: "-Xmx4096m -Dfile.encoding=UTF-8"

    working_directory: android-companion

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
      cancel_previous_builds: true

    scripts:
      - chmod +x gradlew
      - ./gradlew --version
      - ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
